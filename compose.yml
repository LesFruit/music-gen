services:
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    command: uvicorn api.main:app --host 0.0.0.0 --port 8010
    volumes:
      - ./data:/app/data
      - ./assets:/app/assets
    ports:
      - "8010:8010"

  worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.worker
    command: python -m worker.runner
    volumes:
      - ./data:/app/data
      - ./assets:/app/assets
    depends_on:
      - api
